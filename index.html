<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>능률VOCA 중등 기본 [2025] DAY 01~50</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .list {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item:hover {
      background: #f9fafb;
    }

    .left {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .day {
      font-weight: 700;
      font-size: 1rem;
    }

    .title {
      color: var(--muted);
      font-size: 0.92rem;
      word-break: break-all;
    }

    .go {
      flex-shrink: 0;
      background: var(--accent);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .item:hover .go {
      background: var(--accent-hover);
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="header">
      <h1>능률VOCA 중등 기본 [2025]</h1>
      <p class="desc">DAY 01부터 DAY 50까지 바로 열 수 있는 링크 모음입니다.</p>
    </section>

    <section class="list" id="dayList"></section>

    <footer>
      GitHub Pages에 index.html로 올리면 바로 공유할 수 있습니다.
    </footer>
  </div>

  <script>
    const baseId = 25380956;
    const totalDays = 50;
    const baseTitle = '능률VOCA 중등 기본 [2025]';
    const dayList = document.getElementById('dayList');

    for (let day = 1; day <= totalDays; day++) {
      const setId = baseId + (day - 1);
      const dayText = String(day).padStart(2, '0');
      const url = `https://www.classcard.net/set/${setId}`;

      const link = document.createElement('a');
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.className = 'item';

      link.innerHTML = `
        <div class="left">
          <span class="day">DAY ${dayText}</span>
          <span class="title">${baseTitle} DAY ${dayText}</span>
        </div>
        <span class="go">열기</span>
      `;

      dayList.appendChild(link);
    }
  </script>
</body>
</html>
